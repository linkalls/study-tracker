server {
    listen 80;
    server_name localhost;

    # Root directory for Nginx to serve files from
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Compression (optional, but good for performance)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    location / {
        # Try to serve the requested file directly, then as a directory,
        # otherwise fall back to serving index.html (for SPA routing)
        try_files $uri $uri/ /index.html;
    }

    # Optional: Add cache control headers for static assets
    location ~* \.(?:jpg|jpeg|gif|png|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # Optional: Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
