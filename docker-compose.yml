version: '3.8'

services:
  backend:
    build:
      context: ./backend # Updated context to point to the backend directory
      dockerfile: Dockerfile # This will now look for Dockerfile inside ./backend
    ports:
      - "3001:3000" # Host:Container
    volumes:
      # Mount the local SQLite database file (expected to be in backend/) into the container.
      # The backend Dockerfile's WORKDIR is /app, and db.ts will use './db.sqlite' relative to that.
      - ./backend/db.sqlite:/app/db.sqlite 
    environment:
      # NODE_ENV is set to 'production' in the backend Dockerfile.
      # Can also be set here to override or ensure.
      # Example: DATABASE_URL: sqlite:/app/db.sqlite (if app used this)
      - NODE_ENV=production # Explicitly set here as well for clarity, though Dockerfile also sets it.
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80" # Host:Container (Nginx default port is 80)
    restart: unless-stopped
    # depends_on:
    #   - backend # Uncomment if you want frontend to wait for backend to start
                  # This doesn't mean backend is "ready", just that the service started.
                  # For true readiness, health checks would be needed.

# Top-level volumes are not strictly necessary for this setup as we are using a direct bind mount
# for db.sqlite for simplicity. If a named volume (e.g., for more complex data or to let Docker manage
# the storage location) was preferred for the database, it would be defined here like:
# volumes:
#   database_data:
# And then used in the backend service:
# volumes:
#   - database_data:/app/db # if db.sqlite was in /app/db/
# For a single file like SQLite, a direct bind mount is often more straightforward.
# Ensure db.sqlite exists in the root of your project or is created by the application on first run.
# The backend Dockerfile and db.ts are set up to create db.sqlite if it doesn't exist.
# A bind mount will persist this created file on the host.
